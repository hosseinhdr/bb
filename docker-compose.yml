services:
  userbot:
    build: .
    container_name: caption-userbot
    restart: unless-stopped
    env_file: .env
    environment:
      # The bot reads the session from SESSION_PATH. This is the container path
      # and it OVERRIDES whatever SESSION_PATH is in .env (which is a host path),
      # so the container always uses the mounted session below.
      SESSION_PATH: /data/userbot.session
    volumes:
      # Mount your already-logged-in session into the container at /data.
      # Put userbot.session in ./session/ before deploying (see README).
      - ./session:/data
